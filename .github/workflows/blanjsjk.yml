name: Update Repo from Zip

on:
  workflow_dispatch:

permissions:
  contents: write      # required if workflow files are updated (optional here)

jobs:
  update-main:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout main branch
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Download kspanel.zip
      - name: Download kspanel.zip
        run: |
          wget https://github.com/kswarrior/ks-panel-old/releases/download/1.2.0/kspanel.zip -O kspanel.zip

      # 3️⃣ Extract zip
      - name: Extract kspanel.zip
        run: |
          unzip -o kspanel.zip -d extracted

      # 4️⃣ Copy files except .github/workflows
      - name: Copy files
        run: |
          rsync -av --exclude='.github/workflows/*' extracted/ ./ 

      # 5️⃣ Commit & push changes
      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update repo from kspanel.zip" || echo "Nothing to commit"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
