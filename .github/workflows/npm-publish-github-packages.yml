name: Update wings folder

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Important for proper commit history

      - name: Remove old wings folder if exists
        run: rm -rf wings

      - name: Git clone ks-wings
        run: git clone --depth 1 https://github.com/kswarrior/ks-wings.git ks-wings

      - name: Rename to wings folder
        run: mv ks-wings wings

      - name: Commit and push wings folder
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add -f wings/     # Force add even if gitignored
          
          if git diff --staged --quiet; then
            echo "No changes detected in wings folder."
          else
            git commit -m "Update wings folder from https://github.com/kswarrior/ks-wings"
            git push
            echo "✅ wings folder successfully uploaded and pushed to your repo"
          fi
