name: Remove wings submodule

on:
  workflow_dispatch:

jobs:
  remove:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      - name: Completely remove wings submodule
        run: |
          # Deinitialize submodule
          git submodule deinit --force wings 2>/dev/null || true
          
          # Remove submodule files from Git
          rm -rf .git/modules/wings 2>/dev/null || true
          git rm -f wings 2>/dev/null || true
          
          # Clean .gitmodules file if it exists
          if [ -f .gitmodules ]; then
            sed -i '/\[submodule "wings"\]/,/^$/d' .gitmodules 2>/dev/null || true
            # Remove file if it becomes empty
            if ! grep -q "submodule" .gitmodules 2>/dev/null; then
              rm -f .gitmodules
            fi
            git add .gitmodules 2>/dev/null || true
          fi
          
          # Commit and push the removal
          git add -A
          if git diff --staged --quiet; then
            echo "✅ Nothing to remove - wings already gone"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "Remove wings submodule"
            git push
            echo "✅ wings submodule successfully deleted!"
          fi
