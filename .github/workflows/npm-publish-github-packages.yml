name: Update wings folder

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remove old wings folder completely
        run: rm -rf wings

      - name: Git clone ks-wings
        run: git clone --depth 1 https://github.com/kswarrior/ks-wings.git ks-wings

      - name: Rename folder to wings
        run: mv ks-wings wings

      - name: Commit and push the new wings folder
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Force add the entire wings folder
          git add -f wings/
          
          if git diff --staged --quiet; then
            echo "No changes detected."
          else
            git commit -m "Update wings folder from https://github.com/kswarrior/ks-wings (full replace)"
            git push
            echo "✅ New wings folder successfully uploaded and pushed!"
          fi
