name: Update wings folder

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Completely remove old wings (from disk and Git)
        run: |
          rm -rf wings
          git rm -r --ignore-unmatch wings || true

      - name: Git clone fresh ks-wings
        run: git clone --depth 1 https://github.com/kswarrior/ks-wings.git ks-wings

      - name: Rename to wings
        run: mv ks-wings wings

      - name: Force add and push new wings folder
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add -f wings/
          
          if git diff --staged --quiet; then
            echo "No changes detected."
          else
            git commit -m "Replace wings folder with fresh copy from https://github.com/kswarrior/ks-wings"
            git push
            echo "✅ Old wings completely removed and new wings folder uploaded successfully!"
          fi
