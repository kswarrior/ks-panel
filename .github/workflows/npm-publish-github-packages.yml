name: Update wings folder

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Completely remove old wings folder
        run: rm -rf wings

      - name: Git clone ks-wings (fresh copy)
        run: git clone --depth 1 https://github.com/kswarrior/ks-wings.git ks-wings

      - name: Rename to wings
        run: mv ks-wings wings

      - name: Force commit and push new wings folder
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add -f wings/
          
          if git diff --staged --quiet; then
            echo "No changes detected."
          else
            git commit -m "Replace wings folder with fresh copy from https://github.com/kswarrior/ks-wings"
            git push
            echo "✅ Old wings deleted and new wings folder successfully uploaded!"
          fi
