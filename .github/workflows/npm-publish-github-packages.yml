name: Update wings folder

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      - name: Git clone ks-wings
        run: git clone https://github.com/kswarrior/ks-wings.git ks-wings

      - name: Rename to wings folder
        run: mv ks-wings wings

      - name: Commit and push wings folder
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add wings/
          
          if git diff --staged --quiet; then
            echo "No changes to wings folder."
          else
            git commit -m "Update wings folder from ks-wings repo"
            git push
            echo "✅ wings folder uploaded to your repo"
          fi
