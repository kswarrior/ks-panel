name: AI Panel Coder (Self-Editing)
on:
  workflow_dispatch:

jobs:
  ai-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Ollama & Dependencies
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          # Start Ollama and wait for the socket to be active
          ollama serve & 
          until curl -s http://localhost:11434/api/tags > /dev/null; do sleep 2; done
          
          ollama pull qwen2.5-coder:7b
          sudo apt-get update -y
          pip3 install requests

      - name: Run AI Agent
        run: |
          # Ensure prompt.txt exists for the script to read
          if [ ! -f prompt.txt ]; then
            echo "Redesign the file panel/logo.ejs. Create a complete, stylish, and modern Logo Page. Use a deep black 'Gamer' theme, neon cyan accents, glassmorphism cards, and a high-quality SVG logo in the center." > prompt.txt
          fi

          cat > /tmp/ai_coder.py << 'PYEOF'
          import requests
          import os
          import re
          import sys
          import textwrap

          # Load Prompt
          if not os.path.exists('prompt.txt'):
              print("❌ Error: prompt.txt not found")
              sys.exit(1)
              
          with open('prompt.txt', 'r', encoding='utf-8') as f:
              user_prompt = f.read().strip()

          system_prompt = """You are an expert senior full-stack Node.js / EJS developer.
          You are ONLY allowed to edit files inside the 'panel' folder.
          Respond with nothing except the file blocks.
          
          FILE: panel/path/to/file.ejs
          CODE:
          [full content]
          END_FILE
          """

          payload = {
              "model": "qwen2.5-coder:7b",
              "messages": [
                  {"role": "system", "content": system_prompt},
                  {"role": "user", "content": user_prompt}
              ],
              "stream": False,
              "options": {"temperature": 0.2, "num_predict": -1}
          }

          print("🔌 Calling Ollama API...")
          try:
              resp = requests.post("http://localhost:11434/api/chat", json=payload, timeout=600)
              ai_response = resp.json().get("message", {}).get("content", "").strip()
          except Exception as e:
              print("❌ ERROR:", e)
              sys.exit(1)

          if "NO_CHANGES_NEEDED" in ai_response or len(ai_response) < 20:
              print("🤖 No changes needed.")
              sys.exit(0)

          pattern = r'FILE:\s*(panel/.+?)\s*CODE:\s*(.*?)\s*END_FILE'
          matches = re.finditer(pattern, ai_response, re.DOTALL)

          for match in matches:
              path, code = match.group(1).strip(), match.group(2).strip()
              os.makedirs(os.path.dirname(path), exist_ok=True)
              with open(path, 'w') as f:
                  f.write(code)
              print(f"✅ Updated {path}")
          PYEOF
          
          python3 /tmp/ai_coder.py

      - name: Commit and Push
        run: |
          git config --global user.name "KS-AI-Bot"
          git config --global user.email "bot@github.com"
          git add panel/
          if ! git diff --cached --quiet; then
            git commit -m "AI Auto-Update: Redesigned Logo Page"
            git push
          fi
