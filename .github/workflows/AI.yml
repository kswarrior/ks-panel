name: AI Panel Coder (Self-Editing)
on:
  workflow_dispatch:

jobs:
  ai-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Ollama & Dependencies
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          # Start Ollama and wait for the socket to be active
          ollama serve & 
          until curl -s http://localhost:11434/api/tags > /dev/null; do sleep 2; done
          
          ollama pull qwen2.5-coder:7b
          sudo apt-get update -y
          pip3 install requests

      - name: Run AI Agent
        run: |
          if [ ! -f prompt.txt ]; then
            echo "Redesign the file panel/logo.ejs. Create a complete, stylish, and modern Logo Page. Use a deep black 'Gamer' theme, neon cyan accents, glassmorphism cards, and a high-quality SVG logo in the center." > prompt.txt
          fi

          cat > /tmp/ai_coder.py << 'PYEOF'
          import requests
          import os
          import re
          import sys

          # --- LOAD USER PROMPT ---
          if not os.path.exists('prompt.txt'):
              print("❌ Error: prompt.txt not found")
              sys.exit(1)
              
          with open('prompt.txt', 'r', encoding='utf-8') as f:
              user_prompt = f.read().strip()

          # --- GATHER PROJECT CONTEXT (Read all files in panel/) ---
          print("📁 Reading project files for AI context...")
          context_data = "CURRENT PROJECT FILES (Use these to understand the project structure and styling):\n"
          files_read = 0
          
          if os.path.exists('panel'):
              for root, dirs, files in os.walk('panel'):
                  for file in files:
                      # Only read text/code files to save context space
                      if file.endswith(('.js', '.ejs', '.html', '.css', '.json')):
                          file_path = os.path.join(root, file)
                          try:
                              with open(file_path, 'r', encoding='utf-8') as file_obj:
                                  content = file_obj.read()
                                  context_data += f"\n--- START OF {file_path} ---\n{content}\n--- END OF {file_path} ---\n"
                                  files_read += 1
                          except Exception as e:
                              print(f"⚠️ Could not read {file_path}: {e}")
          else:
              context_data += "No files exist in the panel/ directory yet.\n"
              
          print(f"✅ Loaded {files_read} files into context.")

          # --- BUILD THE FULL PROMPT ---
          full_prompt = f"{context_data}\n\nUSER REQUEST TO EXECUTE:\n{user_prompt}"

          system_prompt = """You are an expert full-stack Node.js / EJS developer building 'KS Panel'.
          You have been provided with the current codebase as context above. Read it to understand the layout, CSS, and logic.
          
          CRITICAL RULES:
          1. DO NOT include any comments (like , /* */, or //) or metadata in the code. Keep it completely clean.
          2. Respond ONLY with the code for the files you are modifying or creating, wrapped in @@@ delimiters.
          3. Never add markdown formatting, explanations, or backticks.

          Example format:
          @@@panel/logo.ejs
          <!DOCTYPE html>
          <html>
          <body>...</body>
          </html>
          @@@
          """

          payload = {
              "model": "qwen2.5-coder:7b",
              "messages": [
                  {"role": "system", "content": system_prompt},
                  {"role": "user", "content": full_prompt}
              ],
              "stream": False,
              "options": {"temperature": 0.1, "num_predict": 3000, "num_ctx": 8192}
          }

          print("🔌 Calling Ollama API...")
          try:
              resp = requests.post("http://localhost:11434/api/chat", json=payload, timeout=600)
              resp.raise_for_status()
              ai_response = resp.json().get("message", {}).get("content", "").strip()
          except Exception as e:
              print("❌ ERROR:", e)
              sys.exit(1)

          # --- DEBUGGING: PRINT RAW RESPONSE ---
          print("\n" + "="*50)
          print("🤖 RAW AI OUTPUT:")
          print("="*50)
          print(ai_response)
          print("="*50 + "\n")

          # --- PARSE AND WRITE FILES ---
          pattern = r'@@@([\w/.-]+)\n(.*?)@@@'
          matches = re.finditer(pattern, ai_response, re.DOTALL)

          files_updated = 0
          for match in matches:
              path = match.group(1).strip()
              code = match.group(2).strip()
              
              if not path.startswith('panel/'):
                  continue
                  
              os.makedirs(os.path.dirname(path), exist_ok=True)
              with open(path, 'w', encoding='utf-8') as f:
                  f.write(code + '\n')
              print(f"✅ Updated {path}")
              files_updated += 1
              
          if files_updated == 0:
              print("⚠️ WARNING: AI did not output any valid @@@ code blocks. Check the RAW AI OUTPUT above.")
              sys.exit(0)
          PYEOF
          
          python3 /tmp/ai_coder.py

          

      - name: Commit and Push
        run: |
          git config --global user.name "KS-AI-Bot"
          git config --global user.email "bot@github.com"
          git add panel/
          if ! git diff --cached --quiet; then
            git commit -m "AI Auto-Update: Redesigned Logo Page"
            git push
          fi
