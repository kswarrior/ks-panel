name: Panel

on:
  push:
    branches:
      - main
    paths:
      - 'panel/**'
  workflow_dispatch:

permissions:
  contents: write          # ← Add this

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(jq -r .version panel/package.json)
          echo "Version found: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Create zip of panel folder
        run: |
          ZIP_NAME="panel-v${{ env.VERSION }}.zip"          # nicer name with version
          echo "Creating $ZIP_NAME"
          cd panel
          zip -r "../$ZIP_NAME" . -x ".git/*" "**/.git/*"
          cd ..
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          ls -lh "$ZIP_NAME"                                # for debugging

      - name: Ensure release exists
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view "${{ env.VERSION }}" >/dev/null 2>&1; then
            echo "Creating release ${{ env.VERSION }}"
            gh release create "${{ env.VERSION }}" \
              --title "${{ env.VERSION }}" \
              --notes "Automated release for version ${{ env.VERSION }}"
          else
            echo "Release ${{ env.VERSION }} already exists"
          fi

      - name: Upload zip to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "\( {{ env.VERSION }}" " \){{ env.ZIP_NAME }}" --clobber
