name: Update Repo from Zip

on:
  workflow_dispatch:

jobs:
  update-main:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout main branch
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      # 2️⃣ Install unzip & wget
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y unzip wget

      # 3️⃣ Download zip from release
      - name: Download kspanel.zip
        run: |
          URL="https://github.com/kswarrior/ks-panel-old/releases/download/1.2.0/kspanel.zip"
          echo "Downloading from $URL"
          wget -O kspanel.zip "$URL"
          ls -la  # verify the file exists

      # 4️⃣ Delete all files except .git
      - name: Delete all files
        run: |
          shopt -s extglob
          rm -rf !( .git )

      # 5️⃣ Extract zip into repo
      - name: Extract zip
        run: |
          if [ -f kspanel.zip ]; then
            unzip kspanel.zip -d .
          else
            echo "kspanel.zip not found!"
            exit 1
          fi

      # 6️⃣ Commit & push changes to main
      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update repo from kspanel.zip" || echo "Nothing to commit"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 7️⃣ Cleanup zip
      - name: Remove zip
        run: rm -f kspanel.zip
