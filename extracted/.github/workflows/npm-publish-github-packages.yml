name: zip

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Set fixed version
      - name: Set version
        run: |
          VERSION="1.2.0"
          echo "Version set to $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      # 3️⃣ Create zip of full repository
      - name: Create zip of repository
        run: |
          ZIP_NAME="kspanel.zip"
          echo "Creating zip file $ZIP_NAME"
          zip -r "$ZIP_NAME" . -x ".git/*"
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      # 4️⃣ Ensure release exists
      - name: Ensure release exists
        run: |
          if ! gh release view "$VERSION" > /dev/null 2>&1; then
            echo "Release $VERSION not found, creating..."
            gh release create "$VERSION" -t "$VERSION" -n "Automated release for version $VERSION"
          else
            echo "Release $VERSION already exists."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 5️⃣ Upload zip to the release
      - name: Upload zip to release
        run: |
          gh release upload "$VERSION" "$ZIP_NAME" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
